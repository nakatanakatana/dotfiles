# -----------------------------------------------------------------------------
# My Solarized Dark Skin (Variant)
# Based on: K9s Solarized Dark Skin
# -----------------------------------------------------------------------------

# Styles...
foreground: &foreground "#93a1a1" # base1
background: &background "#002833"
current_line: &current_line "#003440"
selection: &selection "#003440"
comment: &comment "#6272a4"
yellow: &yellow "#b58900"
cyan: &cyan "#2aa198"
green: &green "#859900"
orange: &orange "#cb4b16"
magenta: &magenta "#d33582"
blue: &blue "#268bd2"
red: &red "#dc322f"
violet: &violet "#6c71c4"

# Skin...
k9s:
  body:
    fgColor: *foreground
    bgColor: *background
    logoColor: *blue
  prompt:
    fgColor: *foreground
    bgColor: *background
    suggestColor: *orange
  info:
    fgColor: *yellow
    sectionColor: *foreground
  dialog:
    fgColor: *foreground
    bgColor: *background
    buttonFgColor: *foreground
    buttonBgColor: *magenta
    buttonFocusFgColor: white
    buttonFocusBgColor: *cyan
    labelFgColor: *orange
    fieldFgColor: *foreground
  frame:
    border:
      fgColor: *selection
      focusColor: *cyan
    menu:
      fgColor: *foreground
      keyColor: *yellow
      numKeyColor: *yellow
    crumbs:
      fgColor: *foreground
      bgColor: *current_line
      activeColor: *current_line
    status:
      newColor: *foreground
      modifyColor: *yellow
      addColor: *green
      errorColor: *red
      highlightColor: *orange
      killColor: *comment
      completedColor: *comment
    title:
      fgColor: *foreground
      bgColor: *current_line
      highlightColor: *orange
      counterColor: *blue
      filterColor: *magenta
  views:
    charts:
      bgColor: default
      defaultDialColors:
        - *blue
        - *red
      defaultChartColors:
        - *blue
        - *red
    table:
      fgColor: *foreground
      bgColor: *background
      cursorFgColor: *background
      cursorBgColor: *cyan
      header:
        fgColor: *cyan
        bgColor: *background
        sorterColor: *cyan
    xray:
      fgColor: *foreground
      bgColor: *background
      cursorColor: *cyan
      graphicColor: *blue
      showIcons: false
    yaml:
      keyColor: *yellow
      colonColor: *blue
      valueColor: *foreground
    logs:
      fgColor: *foreground
      bgColor: *background
      indicator:
        fgColor: *foreground
        bgColor: *selection
        toggleOnColor: *magenta
        toggleOffColor: *blue
