[[rule]]
toolName = [
  "enter_plan_mode",
  "glob",
  "google_web_search",
  "grep_search",
  "list_directory",
  "read_file",
  "replace",
  "save_memory",
  "search_file_content",
  "web_fetch",
  "write_file",
  "activate_skill"
]
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "buf",
  "cat",
  "gh api --method GET",
  "gh auth status",
  "gh pr list",
  "gh pr view",
  "gh run list",
  "gh run view",
  "gh search prs",
  "git add",
  "git branch",
  "git diff",
  "git log",
  "git notes",
  "git remote -v",
  "git show",
  "git status",
  "glab auth status",
  "glab ci status",
  "glab ci view",
  "glab issue list",
  "glab issue view",
  "glab mr list",
  "glab mr view",
  "glab run list",
  "glab run view",
  "go build",
  "go test",
  "go tool",
  "golangci-lint",
  "grep",
  "head",
  "ls",
  "make",
  "mkdir",
  "npm ci",
  "npm run",
  "npm test",
  "CI=true npm test",
  "openspec",
  "rm -rf conductor/tracks/",
  "sqlc",
  "tail",
  "wc",
]
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = [
  "npx",
]
decision = "deny"
priority = 100
