model = "gpt-5.6-terra"
model_reasoning_effort = "medium"
cli_auth_credentials_store = "keyring"


[tui]
status_line = ["model-with-reasoning", "context-remaining", "five-hour-limit", "weekly-limit", "branch-changes", "run-state", "approval-mode", "task-progress", "project-name", "pull-request-number", "permissions"]
status_line_use_colors = true

[tui.model_availability_nux]
"gpt-5.5" = 4
"gpt-5.6-sol" = 3

[plugins."superpowers@openai-curated"]
enabled = true

[plugins."github@openai-curated"]
enabled = true

[[sandbox.prefix_rules]]
pattern = ["gh"]
decision = "prompt"
match = [
  "gh auth status",
  "gh pr list *",
  "gh pr create *",
  "gh repo view *",
  "gh issue *"
]

[features]
hooks = true

[hooks.state]

[hooks.state."/home/tanaka/.codex/hooks.json:session_start:0:0"]
trusted_hash = "sha256:13987eccd7b71ae428b42583dedff26bec67aac9bce6cdc11fabf3a1258fb523"

[hooks.state."/home/tanaka/.codex/config.toml:permission_request:0:0"]
trusted_hash = "sha256:8dc151da52267d3d71565b578be07cff7a133967c34c40dd9308b9d5eaee29f6"

[[hooks.PermissionRequest]]
matcher = ""

[[hooks.PermissionRequest.hooks]]
type    = "command"
command = "ccgate codex"
statusMessage = "ccgate evaluating request"
